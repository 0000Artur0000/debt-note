services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-subscriptions}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-subscriptions}"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    init: true
    ports: ["${APP_PORT:-8080}:8080"]
    depends_on: {postgres: {condition: service_healthy}}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-subscriptions}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      APP_ZONE_ID: ${APP_ZONE_ID:-UTC}
      APP_SSE_HEARTBEAT_INTERVAL_SECONDS: ${APP_SSE_HEARTBEAT_INTERVAL_SECONDS:-25}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      start_period: 20s
      interval: 10s
      timeout: 3s
      retries: 5
    stop_grace_period: 25s
    security_opt: ["no-new-privileges:true"]
